name: hhc-line-bot-catalog-sync
type: Microsoft.App/jobs
location: PLACEHOLDER_AZURE_REGION
properties:
  environmentId: PLACEHOLDER_CONTAINER_APP_ENVIRONMENT_ID
  configuration:
    triggerType: Schedule
    replicaTimeout: 600
    replicaRetryLimit: 1
    scheduleTriggerConfig:
      cronExpression: "*/15 * * * *"
      parallelism: 1
      replicaCompletionCount: 1
    secrets:
      - name: line-helper-channel-secret
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_JOB_SECRETS
      - name: line-helper-channel-access-token
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_JOB_SECRETS
      - name: line-helper-admin-user-id
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_JOB_SECRETS
      - name: graph-client-secret
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_JOB_SECRETS
      - name: notion-token
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_JOB_SECRETS
      - name: database-url
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_JOB_SECRETS
      - name: redis-url
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_JOB_SECRETS
  template:
    containers:
      - name: catalog-sync
        image: alive.azurecr.io/alive/hhc-line-function-bot:latest
        args:
          - dist/tools/sync-catalog.js
        env:
          - name: SERVICE_NAME
            value: hhc-line-bot-catalog-sync
          - name: TIME_ZONE
            value: Asia/Taipei
          - name: PROFILE_CONFIG_PATH
            value: /app/config/profiles.json
          - name: LINE_HELPER_CHANNEL_SECRET
            secretRef: line-helper-channel-secret
          - name: LINE_HELPER_CHANNEL_ACCESS_TOKEN
            secretRef: line-helper-channel-access-token
          - name: LINE_HELPER_ADMIN_USER_ID
            secretRef: line-helper-admin-user-id
          - name: DATABASE_URL
            secretRef: database-url
          - name: DATABASE_SSL
            value: "true"
          - name: REDIS_URL
            secretRef: redis-url
          - name: REDIS_KEY_PREFIX
            value: hhc-line-function-bot
          - name: GRAPH_TENANT_ID
            value: PLACEHOLDER_GRAPH_TENANT_ID
          - name: GRAPH_CLIENT_ID
            value: PLACEHOLDER_GRAPH_CLIENT_ID
          - name: GRAPH_CLIENT_SECRET
            secretRef: graph-client-secret
          - name: GRAPH_DRIVE_ID
            value: PLACEHOLDER_GRAPH_DRIVE_ID
          - name: GRAPH_PPT_FOLDER_ITEM_ID
            value: PLACEHOLDER_GRAPH_PPT_FOLDER_ITEM_ID
          - name: GRAPH_POP_SHEET_FOLDER_ITEM_ID
            value: PLACEHOLDER_GRAPH_POP_SHEET_FOLDER_ITEM_ID
          - name: GRAPH_POP_SHEET_DRIVE_ID
            value: PLACEHOLDER_GRAPH_POP_SHEET_DRIVE_ID
          - name: GRAPH_HYMN_SHEET_FOLDER_ITEM_ID
            value: PLACEHOLDER_GRAPH_HYMN_SHEET_FOLDER_ITEM_ID
          - name: GRAPH_XIAOHA_DOCUMENT_FOLDER_ITEM_ID
            value: PLACEHOLDER_GRAPH_XIAOHA_DOCUMENT_FOLDER_ITEM_ID
          - name: GRAPH_XIAOHA_IMAGE_FOLDER_ITEM_ID
            value: PLACEHOLDER_GRAPH_XIAOHA_IMAGE_FOLDER_ITEM_ID
          - name: GRAPH_XIAOHA_OTHER_FOLDER_ITEM_ID
            value: PLACEHOLDER_GRAPH_XIAOHA_OTHER_FOLDER_ITEM_ID
          - name: GRAPH_LINK_SCOPE
            value: anonymous
          - name: GRAPH_LINK_TYPE
            value: view
          - name: SHEET_MUSIC_ALLOWED_EXTENSIONS
            value: pdf,jpg,jpeg
          - name: NOTION_TOKEN
            secretRef: notion-token
          - name: NOTION_SERVICE_DATABASE_ID
            value: PLACEHOLDER_NOTION_SERVICE_DATABASE_ID
          - name: NOTION_DATE_PROPERTY
            value: PLACEHOLDER_NOTION_DATE_PROPERTY
          - name: NOTION_MEETING_PROPERTY
            value: PLACEHOLDER_NOTION_MEETING_PROPERTY
          - name: NOTION_ROLE_PROPERTY
            value: PLACEHOLDER_NOTION_ROLE_PROPERTY
          - name: NOTION_PERSON_PROPERTY
            value: PLACEHOLDER_NOTION_PERSON_PROPERTY
        resources:
          cpu: 0.5
          memory: 1Gi
