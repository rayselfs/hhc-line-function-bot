name: hhc-line-function-bot
type: Microsoft.App/containerApps
location: PLACEHOLDER_AZURE_REGION
properties:
  managedEnvironmentId: PLACEHOLDER_CONTAINER_APP_ENVIRONMENT_ID
  configuration:
    activeRevisionsMode: Single
    dapr:
      enabled: true
      appId: hhc-line-function-bot
      appPort: 3000
      appProtocol: http
    ingress:
      external: false
      targetPort: 3000
      transport: auto
    secrets:
      - name: bot-profiles-base64-json
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_SECRETS
      - name: ollama-base-url
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_SECRETS
      - name: graph-client-secret
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_SECRETS
      - name: notion-token
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_SECRETS
      - name: database-url
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_SECRETS
      - name: redis-url
        value: PLACEHOLDER_SET_IN_AZURE_CONTAINER_APP_SECRETS
  template:
    containers:
      - name: hhc-line-function-bot
        image: alive.azurecr.io/alive/hhc-line-function-bot:latest
        env:
          - name: SERVICE_NAME
            value: hhc-line-function-bot
          - name: PORT
            value: "3000"
          - name: TIME_ZONE
            value: Asia/Taipei
          - name: HEALTH_PATH
            value: /healthz
          - name: READY_PATH
            value: /readyz
          - name: CODEX_HOME
            value: /mnt/codex-home
          - name: PROVIDER_AUTH_HOME
            value: /mnt/provider-auth
          - name: BOT_PROFILES_BASE64_JSON
            secretRef: bot-profiles-base64-json
          - name: OLLAMA_BASE_URL
            secretRef: ollama-base-url
          - name: OLLAMA_MODEL
            value: qwen3:4b-instruct
          - name: KEYWORD_FALLBACK_ENABLED
            value: "true"
          - name: DATABASE_URL
            secretRef: database-url
          - name: DATABASE_SSL
            value: "true"
          - name: REDIS_URL
            secretRef: redis-url
          - name: REDIS_KEY_PREFIX
            value: hhc-line-function-bot
          - name: REGISTRATION_INVITE_CODE_TTL_MINUTES
            value: "60"
          - name: CONFIRMATION_TTL_MINUTES
            value: "5"
          - name: GRAPH_TENANT_ID
            value: PLACEHOLDER_GRAPH_TENANT_ID
          - name: GRAPH_CLIENT_ID
            value: PLACEHOLDER_GRAPH_CLIENT_ID
          - name: GRAPH_CLIENT_SECRET
            secretRef: graph-client-secret
          - name: GRAPH_DRIVE_ID
            value: PLACEHOLDER_GRAPH_DRIVE_ID
          - name: GRAPH_PPT_FOLDER_ITEM_ID
            value: PLACEHOLDER_GRAPH_PPT_FOLDER_ITEM_ID
          - name: GRAPH_SHEET_MUSIC_FOLDER_ITEM_ID
            value: PLACEHOLDER_GRAPH_SHEET_MUSIC_FOLDER_ITEM_ID
          - name: GRAPH_SHEET_MUSIC_FOLDER_PATH
            value: 文件/流行歌譜 (捷徑)
          - name: GRAPH_LINK_SCOPE
            value: anonymous
          - name: GRAPH_LINK_TYPE
            value: view
          - name: PPT_ALLOWED_EXTENSIONS
            value: ppt,pptx,pdf
          - name: SHEET_MUSIC_ALLOWED_EXTENSIONS
            value: pdf,jpg,jpeg
          - name: SHEET_MUSIC_DEFAULT_RECURSIVE
            value: "true"
          - name: NOTION_TOKEN
            secretRef: notion-token
          - name: NOTION_SERVICE_DATABASE_ID
            value: PLACEHOLDER_NOTION_DATABASE_ID
          - name: NOTION_DATE_PROPERTY
            value: Date
          - name: NOTION_MEETING_PROPERTY
            value: Meeting
          - name: NOTION_ROLE_PROPERTY
            value: Role
          - name: NOTION_PERSON_PROPERTY
            value: Person
        volumeMounts:
          - volumeName: codex-home
            mountPath: /mnt/codex-home
          - volumeName: provider-auth
            mountPath: /mnt/provider-auth
        probes:
          - type: Liveness
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          - type: Readiness
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
    volumes:
      - name: codex-home
        storageType: AzureFile
        storageName: codex-home
      - name: provider-auth
        storageType: AzureFile
        storageName: provider-auth
