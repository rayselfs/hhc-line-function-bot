trigger:
  branches:
    include:
      - main
  paths:
    include:
      - azure-pipelines.yml
      - Dockerfile
      - .dockerignore
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.json
      - eslint.config.js
      - vitest.config.ts
      - src/**
      - config/**
      - aca.containerapp.yaml
    exclude:
      - skills/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - azure-pipelines.yml
      - Dockerfile
      - .dockerignore
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.json
      - eslint.config.js
      - vitest.config.ts
      - src/**
      - config/**
      - aca.containerapp.yaml
    exclude:
      - skills/**

pool:
  vmImage: ubuntu-latest

variables:
  azureSubscription: "alive-azure-rm"
  nodeVersion: "24.x"
  pnpmVersion: "11.7.0"
  acrName: "alive"
  acrLoginServer: "alive.azurecr.io"
  imageRepository: "alive/hhc-line-function-bot"
  dockerfilePath: "$(Build.SourcesDirectory)/Dockerfile"
  imageTag: "$(Build.SourceBranchName)-$(Build.BuildId)"
  resourceGroup: "alive"
  containerAppName: "hhc-line-function-bot"

stages:
  - stage: Validate
    displayName: Validate app
    jobs:
      - job: validate
        displayName: pnpm checks
        steps:
          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: "$(nodeVersion)"

          - script: |
              set -euo pipefail
              corepack enable
              corepack prepare pnpm@$(pnpmVersion) --activate
              pnpm --version
            displayName: Enable pnpm

          - script: pnpm install --frozen-lockfile
            displayName: Install dependencies

          - script: pnpm format:check
            displayName: Check formatting

          - script: pnpm typecheck
            displayName: Typecheck

          - script: pnpm lint
            displayName: Lint

          - script: pnpm test
            displayName: Test

          - script: pnpm config:validate
            displayName: Validate production profile config

          - script: pnpm eval:router
            displayName: Router eval replay

          - script: pnpm build
            displayName: Build app

  - stage: BuildAndPush
    displayName: Build and push image to ACR
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: build_push
        displayName: az acr build
        steps:
          - task: AzureCLI@2
            displayName: Build and push image to ACR
            inputs:
              azureSubscription: "$(azureSubscription)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az acr build \
                  --registry "$(acrName)" \
                  --image "$(imageRepository):$(imageTag)" \
                  --image "$(imageRepository):latest" \
                  --file "$(dockerfilePath)" \
                  "$(Build.SourcesDirectory)"

          - script: |
              echo "Pushed $(acrLoginServer)/$(imageRepository):$(imageTag)"
              echo "Pushed $(acrLoginServer)/$(imageRepository):latest"
            displayName: Show pushed image refs

  - stage: Deploy
    displayName: Deploy to Azure Container Apps
    dependsOn: BuildAndPush
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: deploy_aca
        displayName: Update ACA image
        steps:
          - task: AzureCLI@2
            displayName: Deploy image to ACA
            inputs:
              azureSubscription: "$(azureSubscription)"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                image_ref="$(acrLoginServer)/$(imageRepository):$(imageTag)"
                echo "Deploying ${image_ref} to $(containerAppName)"

                legacy_profile_envs=()
                for env_name in BOT_PROFILES_BASE64_JSON BOT_PROFILES_JSON PROFILE_CONFIG_VERSION; do
                  value="$(az containerapp show \
                    --resource-group "$(resourceGroup)" \
                    --name "$(containerAppName)" \
                    --query "properties.template.containers[0].env[?name=='${env_name}'].name | [0]" \
                    --output tsv)"
                  if [[ -n "${value}" ]]; then
                    legacy_profile_envs+=("${env_name}")
                  fi
                done

                update_args=(
                  --resource-group "$(resourceGroup)"
                  --name "$(containerAppName)"
                  --image "${image_ref}"
                  --set-env-vars
                  "PROFILE_CONFIG_PATH=/app/config/profiles.json"
                  "READY_PATH=/readyz"
                  "LLM_CONTEXT_WINDOW_TOKENS=272000"
                  "LLM_RUNTIME_CONTEXT_BUDGET_TOKENS=2000"
                  "LLM_CONTEXT_COMPRESSION_THRESHOLD_RATIO=0.75"
                  "LLM_GENERAL_MAX_OUTPUT_TOKENS=160"
                  "LLM_ROUTE_MAX_OUTPUT_TOKENS=256"
                  "CONFIRMATION_TTL_MINUTES=5"
                  "RATE_LIMIT_ENABLED=true"
                  "RATE_LIMIT_WINDOW_MS=60000"
                  "RATE_LIMIT_MAX_REQUESTS=20"
                  "LAST_ERRORS_MAX_ENTRIES=20"
                  "GRAPH_SHEET_MUSIC_FOLDER_PATH=文件/流行歌譜 (捷徑)"
                  "PPT_DEFAULT_INCLUDE_PDF=false"
                  "SHEET_MUSIC_ALLOWED_EXTENSIONS=pdf,jpg,jpeg"
                  "SHEET_MUSIC_DEFAULT_RECURSIVE=true"
                )
                if [[ ${#legacy_profile_envs[@]} -gt 0 ]]; then
                  update_args+=(--remove-env-vars "${legacy_profile_envs[@]}")
                fi

                az containerapp update "${update_args[@]}" \
                  --only-show-errors \
                  --output none

                target_revision="$(az containerapp show \
                  --resource-group "$(resourceGroup)" \
                  --name "$(containerAppName)" \
                  --query "properties.latestRevisionName" \
                  --output tsv)"

                echo "Waiting for revision ${target_revision} to become ready"
                revision_ready=false
                for attempt in {1..30}; do
                  app_state="$(az containerapp show \
                    --resource-group "$(resourceGroup)" \
                    --name "$(containerAppName)" \
                    --query "{latestRevision:properties.latestRevisionName,latestReadyRevision:properties.latestReadyRevisionName,runningStatus:properties.runningStatus,image:properties.template.containers[0].image}" \
                    --output json)"

                  read -r latest_revision latest_ready_revision running_status deployed_image < <(
                    APP_STATE="${app_state}" python3 - <<'PY'
                import json
                import os

                state = json.loads(os.environ["APP_STATE"])
                print("\t".join(str(state.get(key) or "") for key in [
                    "latestRevision",
                    "latestReadyRevision",
                    "runningStatus",
                    "image",
                ]))
                PY
                  )
                  echo "Attempt ${attempt}: latest=${latest_revision}, ready=${latest_ready_revision}, status=${running_status}, image=${deployed_image}"

                  if [[ "${latest_revision}" == "${target_revision}" \
                    && "${latest_ready_revision}" == "${target_revision}" \
                    && "${running_status}" == "Running" \
                    && "${deployed_image}" == "${image_ref}" ]]; then
                    revision_ready=true
                    break
                  fi

                  sleep 10
                done

                if [[ "${revision_ready}" != "true" ]]; then
                  echo "Revision ${target_revision} did not become ready in time"
                  exit 1
                fi

                legacy_profile_secret="$(az containerapp secret list \
                  --resource-group "$(resourceGroup)" \
                  --name "$(containerAppName)" \
                  --query "[?name=='bot-profiles-base64-json'].name | [0]" \
                  --output tsv)"
                if [[ -n "${legacy_profile_secret}" ]]; then
                  az containerapp secret remove \
                    --resource-group "$(resourceGroup)" \
                    --name "$(containerAppName)" \
                    --secret-names bot-profiles-base64-json \
                    --only-show-errors \
                    --output none
                fi

                echo "Deployed ${image_ref} to revision ${target_revision}"
