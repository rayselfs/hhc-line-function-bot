name: hhc-searxng
type: Microsoft.App/containerApps
location: PLACEHOLDER_AZURE_REGION
properties:
  managedEnvironmentId: PLACEHOLDER_CONTAINER_APP_ENVIRONMENT_ID
  configuration:
    ingress:
      external: false
      targetPort: 8080
      transport: http
  template:
    scale:
      minReplicas: 1
      maxReplicas: 1
    containers:
      - name: searxng
        image: docker.io/searxng/searxng@sha256:aaf56bb5ad737d48a8a375778d42eb4ab1757231e6b1eb7980e71d8dd5bdf0de
        env:
          - name: SEARXNG_BIND_ADDRESS
            value: 0.0.0.0
          - name: SEARXNG_PORT
            value: "8080"
          - name: SEARXNG_LIMITER
            value: "false"
          - name: SEARXNG_PUBLIC_INSTANCE
            value: "false"
