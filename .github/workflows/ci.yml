name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.x
  PNPM_VERSION: 11.7.0

jobs:
  validate:
    name: PR CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Validate production profile config
        run: pnpm config:validate
      - name: Controlled agent eval
        run: pnpm eval:agent
      - name: Kernel v1 acceptance gate
        run: pnpm eval:kernel
      - name: Compile app
        run: pnpm build
